name: Fetch World Cup Scores

on:
  schedule:
    - cron: '*/5 * * * *'  # Every 5 minutes (GitHub's minimum; may delay under load)
  workflow_dispatch:

# Needed so the bot can commit the refreshed matches.json back to the repo.
permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Install deps so the scraper can `import cheerio` (it's a devDependency).
      - name: Install dependencies
        run: npm ci

      - name: Fetch and parse scores
        run: npm run fetch-scores

      - name: Commit changes
        run: |
          git config user.name "⚽ World Cup Bot"
          git config user.email "bot@shammas.in"
          git add src/data/matches.json
          git diff --cached --quiet || git commit -m "⚽ Update match scores $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
